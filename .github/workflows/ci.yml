name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-02
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p shared -p sim-cpu -p protocol -- -D warnings
      - name: Build (no GPU crates)
        run: cargo build -p shared -p sim-cpu -p protocol
      - name: Test (CPU only)
        run: cargo test -p shared -p sim-cpu -p protocol
